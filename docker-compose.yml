version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - pagos-data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/pagos.db
      - GIN_MODE=release
    restart: unless-stopped

volumes:
  pagos-data:
